<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>ЦЕХ — управление швейным цехом</title>
  <meta name="description" content="Управление швейным цехом: партии, задачи, зарплаты, себестоимость">

  <!-- PWA / iOS -->

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="/css/styles.css?v=1.0.1">

  <!-- preconnect к Supabase (ускоряет первый запрос) -->
  <script>
    (function () {
      try {
        var env = window.__ENV__ || {};
        var url = env.SUPABASE_URL;
        if (url && url.indexOf('YOUR-PROJECT') === -1) {
          var l = document.createElement('link');
          l.rel = 'preconnect'; l.href = url; l.crossOrigin = '';
          document.head.appendChild(l);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app"><div class="loading">Загрузка…</div></div>
  <script type="module" src="/js/app.js?v=1.0.0"></script>
</body>
